services:
  postgres:
    image: postgres:16-alpine
    container_name: castaminofen-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: castaminofen
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: castaminofen-redis
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:RELEASE.2024-10-02T17-50-41Z
    container_name: castaminofen-minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
